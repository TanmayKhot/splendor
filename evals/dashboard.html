<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splendor AI Eval Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-muted: #8b8fa3;
    --p0: #60a5fa;
    --p0-dim: #60a5fa33;
    --p1: #f472b6;
    --p1-dim: #f472b633;
    --gold: #fbbf24;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-muted); font-size: 13px; }

  .game-banner {
    display: flex; justify-content: center; gap: 32px; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 32px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .game-banner .matchup { font-size: 16px; font-weight: 600; text-align: center; }
  .game-banner .matchup .vs { color: var(--text-muted); margin: 0 8px; }
  .game-banner .model-name.p0 { color: var(--p0); }
  .game-banner .model-name.p1 { color: var(--p1); }
  .game-banner .meta { color: var(--text-muted); font-size: 12px; text-align: center; }
  .game-banner .result { font-size: 14px; font-weight: 600; text-align: center; }
  .game-banner .result .winner { color: var(--gold); }
  .game-banner .result .tiebreak { color: var(--orange); font-size: 11px; font-weight: 400; }

  .tier-badges { display: flex; justify-content: center; gap: 48px; margin-bottom: 28px; }
  .tier-badge { text-align: center; }
  .tier-badge .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .tier-badge .badge { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto 6px; }
  .tier-badge .score { font-size: 12px; color: var(--text-muted); }
  .tier-S { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1d27; }
  .tier-A { background: linear-gradient(135deg, #34d399, #10b981); color: #1a1d27; }
  .tier-B { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #1a1d27; }
  .tier-C { background: linear-gradient(135deg, #fb923c, #f97316); color: #1a1d27; }
  .tier-D { background: linear-gradient(135deg, #f87171, #ef4444); color: #1a1d27; }
  .tier-F { background: linear-gradient(135deg, #6b7280, #4b5563); color: #e1e4ed; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid.full { grid-template-columns: 1fr; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .card h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 500; }

  /* Bar chart */
  .bar-group { margin-bottom: 14px; }
  .bar-group:last-child { margin-bottom: 0; }
  .bar-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: flex; justify-content: space-between; }
  .bar-pair { display: flex; gap: 4px; }
  .bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; min-width: 1px; }
  .bar-fill.p0 { background: var(--p0); }
  .bar-fill.p1 { background: var(--p1); }
  .bar-val { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 600; color: var(--text); text-shadow: 0 1px 3px rgba(0,0,0,0.7); }

  /* Comparison table */
  table.cmp { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.cmp th { text-align: left; color: var(--text-muted); font-weight: 400; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  table.cmp td { padding: 7px 0; border-bottom: 1px solid var(--surface2); }
  table.cmp td:nth-child(2), table.cmp td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
  table.cmp .better { font-weight: 600; }
  table.cmp .p0-better { color: var(--p0); }
  table.cmp .p1-better { color: var(--p1); }
  table.cmp .neutral { color: var(--text-muted); }

  /* Radar / spider chart via SVG */
  .radar-wrap { display: flex; justify-content: center; align-items: center; padding: 10px 0; }
  .radar-wrap svg { max-width: 320px; width: 100%; }

  /* Donut */
  .donut-row { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
  .donut-item { text-align: center; }
  .donut-item svg { display: block; margin: 0 auto 8px; }
  .donut-item .donut-label { font-size: 11px; color: var(--text-muted); }

  /* Head-to-head callouts */
  .callout-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .callout {
    flex: 1; min-width: 120px; background: var(--surface2); border-radius: 8px; padding: 14px; text-align: center;
  }
  .callout .val { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .callout .desc { font-size: 11px; color: var(--text-muted); }

  /* Legend */
  .legend { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; font-size: 12px; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend .dot.p0 { background: var(--p0); }
  .legend .dot.p1 { background: var(--p1); }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center;
    color: var(--text-muted); cursor: pointer; transition: border-color 0.2s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--p0); }
  .drop-zone input { display: none; }
  .drop-zone p { font-size: 14px; margin-bottom: 4px; }
  .drop-zone .hint { font-size: 11px; }

  #dashboard { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Splendor AI Eval Dashboard</h1>
  <p class="subtitle">Drop an eval report JSON to visualize</p>
</div>

<div id="loader">
  <div class="drop-zone" id="dropZone">
    <p>Drop <code>splendor-eval-report-*.json</code> here or click to browse</p>
    <p class="hint">Generated by the "Download Eval Report" button after an AI vs AI game</p>
    <input type="file" id="fileInput" accept=".json">
  </div>
</div>

<div id="dashboard"></div>

<script>
const $ = (s) => document.querySelector(s);
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      render(data);
    } catch { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

function fmt(n, d = 1) {
  if (n == null) return '-';
  return typeof n === 'number' ? (Number.isInteger(n) ? n.toString() : n.toFixed(d)) : n;
}
function pct(n) { return (n * 100).toFixed(1) + '%'; }
function ms(n) { return (n / 1000).toFixed(1) + 's'; }
function dur(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
}

function bar(label, v0, v1, maxVal, fmtFn) {
  fmtFn = fmtFn || fmt;
  const pct0 = maxVal > 0 ? (v0 / maxVal) * 100 : 0;
  const pct1 = maxVal > 0 ? (v1 / maxVal) * 100 : 0;
  return `<div class="bar-group">
    <div class="bar-label"><span>${label}</span></div>
    <div class="bar-pair">
      <div class="bar-track"><div class="bar-fill p0" style="width:${pct0}%"></div><span class="bar-val">${fmtFn(v0)}</span></div>
      <div class="bar-track"><div class="bar-fill p1" style="width:${pct1}%"></div><span class="bar-val">${fmtFn(v1)}</span></div>
    </div>
  </div>`;
}

function cmpRow(label, v0, v1, fmtFn, lowerBetter) {
  fmtFn = fmtFn || fmt;
  let c0 = 'neutral', c1 = 'neutral';
  if (v0 !== v1) {
    const betterIs0 = lowerBetter ? v0 < v1 : v0 > v1;
    c0 = betterIs0 ? 'better p0-better' : '';
    c1 = betterIs0 ? '' : 'better p1-better';
  }
  return `<tr><td>${label}</td><td class="${c0}">${fmtFn(v0)}</td><td class="${c1}">${fmtFn(v1)}</td></tr>`;
}

function donut(value, max, color, size = 64, stroke = 7) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pctVal = max > 0 ? value / max : 0;
  const offset = circ * (1 - pctVal);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.8s ease"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
      fill="var(--text)" font-size="${size < 70 ? 13 : 16}" font-weight="600" font-family="inherit">${pct(pctVal)}</text>
  </svg>`;
}

function radarSVG(data, p0Vals, p1Vals) {
  const cx = 150, cy = 150, R = 110, n = data.length;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  function polar(i, r) {
    const a = startAngle + i * angleStep;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }

  let gridLines = '';
  for (const frac of [0.25, 0.5, 0.75, 1]) {
    const pts = Array.from({length: n}, (_, i) => polar(i, R * frac).join(',')).join(' ');
    gridLines += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`;
  }
  // Axis lines
  let axes = '';
  for (let i = 0; i < n; i++) {
    const [x, y] = polar(i, R);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
  }
  // Labels
  let labels = '';
  for (let i = 0; i < n; i++) {
    const [x, y] = polar(i, R + 18);
    const anchor = x < cx - 5 ? 'end' : x > cx + 5 ? 'start' : 'middle';
    labels += `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="central" fill="var(--text-muted)" font-size="10" font-family="inherit">${data[i].label}</text>`;
  }
  // Data polygons
  function dataPath(vals, color) {
    const pts = vals.map((v, i) => polar(i, R * Math.min(v, 1)).join(',')).join(' ');
    return `<polygon points="${pts}" fill="${color}22" stroke="${color}" stroke-width="1.5"/>`;
  }
  return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}${axes}
    ${dataPath(p1Vals, 'var(--p1)')}
    ${dataPath(p0Vals, 'var(--p0)')}
    ${labels}
  </svg>`;
}

function render(d) {
  const p0 = d.players[0], p1 = d.players[1];
  const winnerIdx = d.winnerIndex;
  const p0Name = d.models[0], p1Name = d.models[1];
  const winnerName = winnerIdx === 0 ? p0Name : winnerIdx === 1 ? p1Name : 'Draw';

  // Radar data (normalized 0-1, higher = better)
  const radarAxes = [
    { label: 'Purchase Rate', k: 'purchaseRate' },
    { label: 'Pts/Purchase', k: 'pointsPerPurchase', max: 5 },
    { label: 'Compliance', fn: p => 1 - p.fallbackRate },
    { label: 'Efficiency', fn: p => Math.min(p.scoringPace / 1, 1) },
    { label: 'Bonus Div.', fn: p => p.bonusDiversity / 5 },
    { label: 'Reserve Eff.', k: 'reserveEfficiency' },
    { label: 'Noble Align.', k: 'nobleAlignedPurchaseRate' },
    { label: 'Gold Eff.', fn: p => p.goldEfficiency.spendRate },
  ];
  const r0 = radarAxes.map(a => a.fn ? a.fn(p0) : Math.min(p0[a.k] / (a.max || 1), 1));
  const r1 = radarAxes.map(a => a.fn ? a.fn(p1) : Math.min(p1[a.k] / (a.max || 1), 1));

  const maxLatency = Math.max(p0.latency.max, p1.latency.max);
  const maxTurns = Math.max(p0.turnsPlayed, p1.turnsPlayed);

  $('#loader').style.display = 'none';
  const el = $('#dashboard');
  el.style.display = 'block';

  el.innerHTML = `
    <!-- Banner -->
    <div class="game-banner">
      <div class="matchup">
        <span class="model-name p0">${p0Name}</span>
        <span class="vs">vs</span>
        <span class="model-name p1">${p1Name}</span>
      </div>
      <div class="result">
        <span class="winner">${winnerName} wins</span>
        ${d.isTiebreakWin ? '<br><span class="tiebreak">Tiebreak (fewer cards)</span>' : ''}
      </div>
      <div class="meta">
        ${d.finalScores[0]}-${d.finalScores[1]} &middot; ${d.totalTurns} turns &middot; ${dur(d.gameDurationMs)}
      </div>
    </div>

    <!-- Tier Badges -->
    <div class="tier-badges">
      <div class="tier-badge">
        <div class="label" style="color:var(--p0)">${p0Name} (P1)</div>
        <div class="badge tier-${p0.tier}">${p0.tier}</div>
        <div class="score">${(p0.compositeScore * 100).toFixed(1)}%</div>
      </div>
      <div class="tier-badge">
        <div class="label" style="color:var(--p1)">${p1Name} (P2)</div>
        <div class="badge tier-${p1.tier}">${p1.tier}</div>
        <div class="score">${(p1.compositeScore * 100).toFixed(1)}%</div>
      </div>
    </div>

    <div class="legend">
      <span><span class="dot p0"></span>${p0Name} (P1)</span>
      <span><span class="dot p1"></span>${p1Name} (P2)</span>
    </div>

    <!-- Radar -->
    <div class="grid full">
      <div class="card">
        <h3>Overall Comparison</h3>
        <div class="radar-wrap">${radarSVG(radarAxes, r0, r1)}</div>
      </div>
    </div>

    <!-- Head-to-Head Callouts -->
    <div class="grid full">
      <div class="card">
        <h3>Head-to-Head</h3>
        <div class="callout-row">
          <div class="callout">
            <div class="val">${d.headToHead.pointDifferential >= 0 ? '+' : ''}${d.headToHead.pointDifferential}</div>
            <div class="desc">Point Diff (P1 perspective)</div>
          </div>
          <div class="callout">
            <div class="val">${d.headToHead.leadChanges}</div>
            <div class="desc">Lead Changes</div>
          </div>
          <div class="callout">
            <div class="val">${d.headToHead.longestLead.turns}</div>
            <div class="desc">Longest Lead (P${d.headToHead.longestLead.playerIndex + 1})</div>
          </div>
          <div class="callout">
            <div class="val" style="color:${d.headToHead.comebackOccurred ? 'var(--gold)' : 'var(--text-muted)'}">${d.headToHead.comebackOccurred ? 'Yes' : 'No'}</div>
            <div class="desc">Comeback${d.headToHead.comebackOccurred ? ` (${d.headToHead.maxDeficitOvercome} pts)` : ''}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Distribution -->
    <div class="grid">
      <div class="card">
        <h3>Action Distribution</h3>
        ${bar('Purchases', p0.actionCounts.purchases, p1.actionCounts.purchases, Math.max(p0.actionCounts.purchases, p1.actionCounts.purchases, 1))}
        ${bar('Take Gems', p0.actionCounts.takeGems, p1.actionCounts.takeGems, Math.max(p0.actionCounts.takeGems, p1.actionCounts.takeGems, 1))}
        ${bar('Take 2 Gems', p0.actionCounts.take2Gems, p1.actionCounts.take2Gems, Math.max(p0.actionCounts.take2Gems, p1.actionCounts.take2Gems, 1))}
        ${bar('Reserves', p0.actionCounts.reserves, p1.actionCounts.reserves, Math.max(p0.actionCounts.reserves, p1.actionCounts.reserves, 1))}
      </div>

      <div class="card">
        <h3>Tier Distribution (Purchases)</h3>
        ${bar('Tier 1', p0.tierDistribution.tier1, p1.tierDistribution.tier1, Math.max(p0.tierDistribution.tier1, p1.tierDistribution.tier1, 1))}
        ${bar('Tier 2', p0.tierDistribution.tier2, p1.tierDistribution.tier2, Math.max(p0.tierDistribution.tier2, p1.tierDistribution.tier2, 1))}
        ${bar('Tier 3', p0.tierDistribution.tier3, p1.tierDistribution.tier3, Math.max(p0.tierDistribution.tier3, p1.tierDistribution.tier3, 1))}
      </div>
    </div>

    <!-- Key Metrics Donuts -->
    <div class="grid full">
      <div class="card">
        <h3>Key Rates</h3>
        <div class="donut-row">
          <div class="donut-item">
            ${donut(p0.purchaseRate, 1, 'var(--p0)')}
            <div class="donut-label">Purchase Rate (P1)</div>
          </div>
          <div class="donut-item">
            ${donut(p1.purchaseRate, 1, 'var(--p1)')}
            <div class="donut-label">Purchase Rate (P2)</div>
          </div>
          <div class="donut-item">
            ${donut(1 - p0.fallbackRate, 1, 'var(--p0)')}
            <div class="donut-label">Compliance (P1)</div>
          </div>
          <div class="donut-item">
            ${donut(1 - p1.fallbackRate, 1, 'var(--p1)')}
            <div class="donut-label">Compliance (P2)</div>
          </div>
          <div class="donut-item">
            ${donut(p0.reserveEfficiency, 1, 'var(--p0)')}
            <div class="donut-label">Reserve Eff. (P1)</div>
          </div>
          <div class="donut-item">
            ${donut(p1.reserveEfficiency, 1, 'var(--p1)')}
            <div class="donut-label">Reserve Eff. (P2)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Detailed Comparison Tables -->
    <div class="grid">
      <div class="card">
        <h3>Efficiency</h3>
        <table class="cmp">
          <tr><th>Metric</th><th>P1</th><th>P2</th></tr>
          ${cmpRow('Scoring Pace', p0.scoringPace, p1.scoringPace, v => fmt(v, 3))}
          ${cmpRow('First Purchase Turn', p0.firstPurchaseTurn, p1.firstPurchaseTurn, fmt, true)}
          ${cmpRow('Purchase Cadence', p0.purchaseCadence, p1.purchaseCadence, v => fmt(v, 1), true)}
          ${cmpRow('Longest Drought', p0.longestPurchaseDrought, p1.longestPurchaseDrought, fmt, true)}
          ${cmpRow('5-pt Milestone', p0.pointMilestones.five, p1.pointMilestones.five, v => v != null ? 'Turn ' + v : '-', true)}
          ${cmpRow('10-pt Milestone', p0.pointMilestones.ten, p1.pointMilestones.ten, v => v != null ? 'Turn ' + v : '-', true)}
          ${cmpRow('15-pt Milestone', p0.pointMilestones.fifteen, p1.pointMilestones.fifteen, v => v != null ? 'Turn ' + v : '-', true)}
        </table>
      </div>

      <div class="card">
        <h3>Action Quality</h3>
        <table class="cmp">
          <tr><th>Metric</th><th>P1</th><th>P2</th></tr>
          ${cmpRow('Purchase Rate', p0.purchaseRate, p1.purchaseRate, pct)}
          ${cmpRow('Pts/Purchase', p0.pointsPerPurchase, p1.pointsPerPurchase, v => fmt(v, 2))}
          ${cmpRow('0-pt Purchase Rate', p0.zeroPtPurchaseRate, p1.zeroPtPurchaseRate, pct, true)}
          ${cmpRow('Gem Hoarding', p0.gemHoardingRate, p1.gemHoardingRate, pct, true)}
          ${cmpRow('Reserve Efficiency', p0.reserveEfficiency, p1.reserveEfficiency, pct)}
          ${cmpRow('Wasted Reserves', p0.wastedReserves, p1.wastedReserves, fmt, true)}
          ${cmpRow('Gold Spend Rate', p0.goldEfficiency.spendRate, p1.goldEfficiency.spendRate, pct)}
        </table>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Strategy</h3>
        <table class="cmp">
          <tr><th>Metric</th><th>P1</th><th>P2</th></tr>
          ${cmpRow('Bonus Diversity', p0.bonusDiversity, p1.bonusDiversity, v => v + '/5')}
          ${cmpRow('Bonus Spread', p0.bonusSpread, p1.bonusSpread, v => fmt(v, 2))}
          ${cmpRow('Nobles Earned', p0.nobleCount, p1.nobleCount, fmt)}
          ${cmpRow('Noble-Aligned %', p0.nobleAlignedPurchaseRate, p1.nobleAlignedPurchaseRate, pct)}
          ${cmpRow('Blocking Reserve %', p0.blockingReserveRate, p1.blockingReserveRate, pct)}
          ${cmpRow('Urgency Shift', p0.urgencyShift, p1.urgencyShift, v => (v >= 0 ? '+' : '') + fmt(v, 2))}
        </table>
      </div>

      <div class="card">
        <h3>Format Compliance</h3>
        <table class="cmp">
          <tr><th>Metric</th><th>P1</th><th>P2</th></tr>
          ${cmpRow('Fallback Rate', p0.fallbackRate, p1.fallbackRate, pct, true)}
          ${cmpRow('Malformed JSON', p0.malformedJsonRate, p1.malformedJsonRate, pct, true)}
          ${cmpRow('Illegal Moves', p0.illegalMoveRate, p1.illegalMoveRate, pct, true)}
          ${cmpRow('Fallbacks (Early)', p0.fallbacksByPhase.early, p1.fallbacksByPhase.early, fmt, true)}
          ${cmpRow('Fallbacks (Mid)', p0.fallbacksByPhase.mid, p1.fallbacksByPhase.mid, fmt, true)}
          ${cmpRow('Fallbacks (Late)', p0.fallbacksByPhase.late, p1.fallbacksByPhase.late, fmt, true)}
        </table>
      </div>
    </div>

    <!-- Latency -->
    <div class="grid full">
      <div class="card">
        <h3>Latency</h3>
        ${bar('Mean', p0.latency.mean, p1.latency.mean, maxLatency, ms)}
        ${bar('Median', p0.latency.median, p1.latency.median, maxLatency, ms)}
        ${bar('P95', p0.latency.p95, p1.latency.p95, maxLatency, ms)}
        ${bar('Min', p0.latency.min, p1.latency.min, maxLatency, ms)}
        ${bar('Max', p0.latency.max, p1.latency.max, maxLatency, ms)}
        ${bar('Total', p0.latency.total, p1.latency.total, Math.max(p0.latency.total, p1.latency.total), v => dur(v))}
      </div>
    </div>
  `;
}
</script>
</body>
</html>
